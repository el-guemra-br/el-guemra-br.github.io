name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & build Black Mafia (Vite)
        working-directory: black-mafia
        run: |
          npm ci
          npm run build

      - name: Build Jekyll site fallback
        run: |
          if [ -f Gemfile ]; then
            bundle install --path vendor/bundle || true
            bundle exec jekyll build -d _site || true
          else
            mkdir -p _site
          fi

      - name: Copy Black Mafia build to _site
        run: |
          if [ -d black-mafia/dist ]; then
            mkdir -p _site/black-mafia
            cp -r black-mafia/dist/* _site/black-mafia/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4