<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Mafia – By el-guemra-br</title>
    <meta name="description" content="Black Mafia is a digital Mafia party game with stunning thematic collections. Play with friends on one device or across multiple devices. Available on Android." />
    <meta name="keywords" content="Black Mafia, mafia game, party game, digital mafia, card game, android game, el-guemra-br" />
    <meta property="og:title" content="Black Mafia – One City. Two Sides. No Mercy." />
    <meta property="og:description" content="A cinematic digital Mafia party game with 6 unique thematic collections." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <script>
      // Fallback for static branch serving: redirect source entry to built app.
      (function () {
        const host = window.location.hostname;
        const isLocal = host === "localhost" || host === "127.0.0.1";
        const inDist = window.location.pathname.includes("/black-mafia/dist/");
        const inBlackMafiaRoot = window.location.pathname.endsWith("/black-mafia/") || window.location.pathname.endsWith("/black-mafia/index.html");

        if (!isLocal && !inDist && inBlackMafiaRoot) {
          window.location.replace("./dist/");
        }
      })();
    </script>
  </head>
  <body> 
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
