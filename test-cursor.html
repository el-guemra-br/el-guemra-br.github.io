<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Follow Effect Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(180deg, #0a050a, #12060c);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Main cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #ff4d6d;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        /* Trail effect */
        .cursor-trail {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 77, 109, 0.5);
            pointer-events: none;
            z-index: 9998;
        }

        /* Glow effect */
        .cursor-glow {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 77, 109, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 9997;
            transform: translate(-50%, -50%);
        }

        h1 {
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            font-size: 3rem;
            text-align: center;
            pointer-events: none;
        }

        p {
            color: #ff9db3;
            font-size: 1.2rem;
            margin-top: 20px;
            text-align: center;
            pointer-events: none;
        }

        /* Interactive elements */
        .box {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 80, 120, 0.3);
            border-radius: 20px;
            margin: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            pointer-events: auto;
        }

        .box:hover {
            background: rgba(255, 80, 120, 0.2);
            box-shadow: 0 0 30px rgba(255, 80, 120, 0.5);
            transform: scale(1.05);
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <!-- Cursor elements -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-glow" id="cursor-glow"></div>

    <!-- Trail dots will be created by JS -->
    <div id="trails"></div>

    <div>
        <h1>Move your mouse!</h1>
        <p>Test the cursor effect</p>
        
        <div class="container">
            <div class="box">Hover Me</div>
            <div class="box">Hover Me</div>
        </div>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        const cursorGlow = document.getElementById('cursor-glow');
        const trailsContainer = document.getElementById('trails');
        
        // Create trail dots
        const trailCount = 15;
        const trails = [];
        
        for (let i = 0; i < trailCount; i++) {
            const trail = document.createElement('div');
            trail.className = 'cursor-trail';
            trail.style.opacity = (1 - i / trailCount) * 0.5;
            trail.style.transform = `scale(${1 - i / trailCount})`;
            trailsContainer.appendChild(trail);
            trails.push({
                element: trail,
                x: 0,
                y: 0
            });
        }

        let mouseX = 0;
        let mouseY = 0;

        // Get initial position
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        // Smooth cursor movement
        function animate() {
            // Main cursor follows mouse
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
            
            // Glow follows mouse
            cursorGlow.style.left = mouseX + 'px';
            cursorGlow.style.top = mouseY + 'px';

            // Trail follows with delay
            let prevX = mouseX;
            let prevY = mouseY;
            
            trails.forEach((trail, index) => {
                // Smooth delay effect
                const delay = index * 0.05;
                trail.x += (prevX - trail.x) * (1 - delay);
                trail.y += (prevY - trail.y) * (1 - delay);
                
                trail.element.style.left = trail.x + 'px';
                trail.element.style.top = trail.y + 'px';
                
                prevX = trail.x;
                prevY = trail.y;
            });

            requestAnimationFrame(animate);
        }

        animate();

        // Hover effects for interactive elements
        const interactiveElements = document.querySelectorAll('.box, a, button');
        
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.transform = 'scale(1.5)';
                cursor.style.background = '#7cffb2';
            });
            
            el.addEventListener('mouseleave', () => {
                cursor.style.transform = 'scale(1)';
                cursor.style.background = '#ff4d6d';
            });
        });

        // Hide cursor when leaving window
        document.addEventListener('mouseleave', () => {
            cursor.style.display = 'none';
            cursorGlow.style.display = 'none';
            trails.forEach(t => t.element.style.display = 'none');
        });

        document.addEventListener('mouseenter', () => {
            cursor.style.display = 'block';
            cursorGlow.style.display = 'block';
            trails.forEach(t => t.element.style.display = 'block');
        });
    </script>
</body>
</html>
